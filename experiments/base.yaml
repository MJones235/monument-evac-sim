# Configuration for Monument Station evacuation simulation (multi-level)

# Simulation parameters
simulation:
  dt: 0.05  # JuPedSim timestep (seconds)
  max_iterations: 18000  # Maximum simulation steps (18000 * 0.05 = 900 seconds)
  decision_interval: 15.0  # Time between Concordia decisions (seconds)
  spawn_interval: 2.0  # Time between agent spawns (seconds)
  network_path: "geometry/monument/network"  # Monument geometry

  # Multi-level simulation (Monument Station has 2 levels: concourse and platforms)
  multi_level: true
  levels: ["0", "-1"]  # Level 0 = concourse, Level -1 = platforms
  # Escalator belt speed in m/s.  Agents on an escalator will never move slower
  # than this relative to the surrounding floor (standard commercial escalator ~0.5 m/s).
  escalator_belt_speed: 0.5

  # Waypoints assigned to agents immediately after a level transfer, used to
  # walk them clear of the escalator exit before the next LLM decision fires.
  # Keyed by level_id (string).  Omit a level to fall back to the walkable-area
  # representative_point() heuristic.
  level_arrival_waypoints:
    "0": [70.0, 35.0]   # Open concourse, near Blackett Street corridor mouth

# Agent configuration
agents:
  count: 50  # Agents distributed across both levels

  # Personality distribution (percentage)
  personalities:
    ISTJ: 13.0
    ISFJ: 12.0
    INFJ: 2.0
    INTJ: 3.0
    ISTP: 6.0
    ISFP: 9.0
    INFP: 4.0
    INTP: 3.0
    ESTP: 6.0
    ESFP: 9.0
    ENFP: 8.0
    ENTP: 3.0
    ESTJ: 11.0
    ESFJ: 12.0
    ENFJ: 3.0
    ENTJ: 2.0

  # Risk tolerance distribution (affects evacuation speed)
  risk_tolerance:
    low: 30.0
    moderate: 50.0
    high: 20.0

  # Age distribution
  age:
    min: 18
    max: 75

  # Spawn zones - agents distributed across concourse/entrances and platforms
  # Concourse/entrance agents: heading to a platform to catch a train
  # Platform agents: 50% waiting to board, 50% just arrived and leaving
  spawn_zones:
    - concourse
    - platform_abc
    - platform_def

  # Distribution of static-knowledge profiles for agents
  knowledge_profiles:
    novice: 30.0
    commuter: 70.0

  # Agent roles define behaviour, goal text, and initial memories.
  # spawn_zones: which zones assign this role (matched after coordinate-based zone detection).
  # weight:      tie-break probability when multiple roles share the same spawn zone.
  # goal:        template for the Concordia goal component.  Placeholders: {target}, {purpose}.
  # memories:    template strings added to starting memory.  Same placeholders.
  # target:      list of values to sample for the {target} placeholder (omit if unused).
  roles:
    heading_to_platform:
      spawn_zones: ["concourse"]
      weight: 1.0
      goal: "Catch your train from Platform {target}."
      memories:
        - "I am at the station today because I need to catch a train from Platform {target}."
        - "My reason for travelling is {purpose}."
      target: [1, 2, 3, 4]
    waiting_for_train:
      spawn_zones: ["platform_abc", "platform_def"]
      weight: 0.5
      goal: "Wait on Platform {target} and board your train when it arrives."
      memories:
        - "I am standing on the platform waiting to board my train from Platform {target}."
        - "I am travelling for {purpose}."
      target: [1, 2, 3, 4]
    just_arrived:
      spawn_zones: ["platform_abc", "platform_def"]
      weight: 0.5
      goal: "Leave the station and continue with your day (next destination: {purpose})."
      memories:
        - "I have just got off my train and stepped onto the platform."
        - "Now that I have arrived I intend to leave the station and get on with my day — I am heading to {purpose}."
      target: []

  # Purposes sampled for the {purpose} placeholder in role templates.
  purposes:
    - "work"
    - "school"
    - "a shopping trip in the city centre"
    - "a medical appointment"
    - "a visit to family"
    - "a university lecture"
    - "a day out in the city"
    - "a job interview"
    - "a meeting in the city centre"

# Event configuration
  # A single global event: the fire alarm is sounding

# Population monitoring configuration
# Snapshots are recorded every interval_seconds of simulation time.
# Each zone entry supports:
#   name                   - identifier used in output files
#   description            - human-readable label for tables/charts
#   type: exited           - cumulative count of fully evacuated agents
#   type: level (default)  - active agents, filtered by level and/or area
#   level                  - JuPedSim level ID to filter on ("0" = concourse, "-1" = platforms)
#   area_patterns          - list of name prefixes: count only agents inside matching polygons
#   exclude_area_patterns  - list of name prefixes: exclude agents inside matching polygons
monitoring:
  interval_seconds: 15
  zones:
    - name: left_station
      description: "Agents who have left the station"
      type: exited

    - name: concourse
      description: "Agents on the concourse (level 0)"
      level: "0"

    - name: escalator_bottom
      description: "Agents at the bottom of escalators (level -1, escalator zones)"
      level: "-1"
      area_patterns:
        - "L-1_esc"   # matches L-1_esc_* exit boxes and L-1_esc_corridor_* polygons

    - name: platform
      description: "Agents on a platform (level -1)"
      level: "-1"
      exclude_area_patterns:
        - "L-1_esc"

# Test scenarios - disabled
test_scenarios:
  blocked_exit:
    enabled: false
    description: "Disabled"

  help_behavior:
    enabled: false
    description: "Disabled"

# LLM configuration
# Note: Credentials are loaded from .env file
llm:
  temperature: 0.7
  max_retries: 3
  max_completion_tokens: 8000
  embedder: "sentence-transformers/all-mpnet-base-v2"

# Output configuration
output:
  directory: "results"
  agent_decisions: "agent_decisions.json"
  events: "events.json"
  statistics: "statistics.json"

station:
  # Human-readable labels for zone/level IDs — used in agent observations and memories.
  # These labels should clearly identify where the agent is AND what exits are nearby,
  # so the agent can connect its goal (e.g. "Platform 2") to its current location.
  zone_labels:
    level_-1: "the underground platform level"
    level_-2: "the lower underground level"
    level_1:  "the upper concourse level"
    platform_1: "Platform 1 (Escalators E and F go up to the concourse)"
    platform_2: "Platform 2 (Escalators E and F go up to the concourse)"
    platform_3: "Platform 3 (Escalators B and C go up to the concourse)"
    platform_4: "Platform 4 (Escalators B and C go up to the concourse)"
    concourse:  "the concourse (upper level — exits to Blackett Street, Grey Street and Eldon Square)"

  # Exits that arrive INTO each zone from elsewhere (not valid departure choices).
  # Prevents agents being offered an escalator that brings them here as a way to leave.
  # Scenario-agnostic — populated per-zone, not per-level.
  arrival_exits_by_zone:
    concourse:   [escalator_b_up, escalator_c_up, escalator_e_up, escalator_f_up]
    platform_1:  []
    platform_2:  []
    platform_3:  []
    platform_4:  []

  # Exits each knowledge profile can recall from memory, organised by zone.
  # Commuters know the specific exits for the zone they are in.
  # Novices rely on what they can see; they only know major signed exits as a fallback.
  zone_known_exits_by_profile:
    platform_1:
      commuter: [escalator_e_up, escalator_f_up]
      novice:   []
    platform_2:
      commuter: [escalator_e_up, escalator_f_up]
      novice:   []
    platform_3:
      commuter: [escalator_b_up, escalator_c_up]
      novice:   []
    platform_4:
      commuter: [escalator_b_up, escalator_c_up]
      novice:   []
    concourse:
      commuter: [blackett_street, grey_street, eldon_square, escalator_a_down, escalator_d_down]
      novice:   [blackett_street, grey_street, eldon_square]

  # Zone names hidden from the intermediate-navigation zones list when the agent is in a
  # given zone.  Prevents offering destinations that cannot be reached without first
  # using an exit (e.g. platform zones are not directly walkable from the concourse).
  zones_hidden_for_zone:
    concourse: [platform_1, platform_2, platform_3, platform_4]

  # Substrings that indicate an agent's goal refers to a particular zone.
  # Used to detect when an agent has already reached their goal destination.
  zone_goal_keywords:
    platform_1: ["Platform 1"]
    platform_2: ["Platform 2"]
    platform_3: ["Platform 3"]
    platform_4: ["Platform 4"]
    concourse:  []

  # UP escalators reachable from each platform zone (used for commuter valid-exits prompt).
  platform_up_exits:
    platform_abc:
      - escalator_b_up
      - escalator_c_up
    platform_def:
      - escalator_e_up
      - escalator_f_up

  # DOWN escalator zones on level 0 that lead to each platform zone.
  # Values are canonical escalator IDs (as used in the exit registry).
  # platform_abc (Platforms 3 & 4) is reached via Escalator A (going down).
  # platform_def (Platforms 1 & 2) is reached via Escalator D (going down).
  platform_down_exits:
    platform_abc:
      - escalator_a_down
    platform_def:
      - escalator_d_down
    platform_1:
      - escalator_d_down
    platform_2:
      - escalator_d_down
    platform_3:
      - escalator_a_down
    platform_4:
      - escalator_a_down

  # Street-level exits on level 0 (used for commuter valid-exits prompt on concourse).
  street_exits:
    - blackett_street
    - grey_street
    - eldon_square

  # Override the auto-generated display names for exits shown to agents.
  # The default for escalator_a_down is "Escalator A (going down)", which is
  # ambiguous — the LLM may interpret "going down" as descending toward street
  # level rather than toward the underground platforms.
  custom_exit_display_names:
    escalator_a_down: "Escalator A (down to platforms)"
    escalator_d_down: "Escalator D (down to platforms)"
    train_platform_1: "Train at Platform 1 (board to evacuate)"
    train_platform_2: "Train at Platform 2 (board to evacuate)"
    train_platform_3: "Train at Platform 3 (board to evacuate)"
    train_platform_4: "Train at Platform 4 (board to evacuate)"

  # Fallback zone when an agent's zone cannot be determined from spawn position.
  default_platform_zone: "platform_def"

  # Rules for assigning initial_zone from spawn coordinates.
  zone_boundaries:
    "-1":
      platform_abc:
        x_lt: -15
        y_gt: 30
      platform_def:
        default: true
    "0":
      concourse:
        default: true

  knowledge:
    base_memories:
      - "I am inside Monument station in central Newcastle."
      - "This station has multiple levels connected by escalators and stairs."
      - "To reach street level from platforms, I need to go up to the concourse first."
      - "Wayfinding signs and nearby crowd behavior can help me navigate."

    profiles:
      novice:
        - "I am unfamiliar with this layout and may need to orient myself at decision points."
        - "I prefer following clear directional signs and nearby crowd cues."
        - "If routes conflict, I prioritize the route that appears better marked."
      commuter:
        - "I know the general layout of this station from regular travel."
        - "I know that UP escalators on my platform lead to the concourse, but I always use the nearest one visible to me."
        - "I navigate by what I can see around me, using my general knowledge to help interpret signs and exits."

    location_memories:
      - when:
          profiles: ["commuter"]
          level_ids: ["-1"]
          zones: ["platform_abc"]
        memories:
          - "On this platform, Escalator B (going up) and Escalator C (going up) lead to the concourse and street exits."
          - "Escalator A goes down and does not lead toward the street exits."
      - when:
          profiles: ["commuter"]
          level_ids: ["-1"]
          zones: ["platform_def"]
        memories:
          - "On this platform, Escalator E (going up) and Escalator F (going up) lead to the concourse and street exits."
          - "Escalator D goes down and does not lead toward the street exits."
      - when:
          profiles: ["novice"]
          level_ids: ["-1"]
          zones: ["platform_abc", "platform_def"]
        memories:
          - "From platform level, I should follow signs to an UP escalator in my immediate surroundings to reach the concourse exits."
      - when:
          level_ids: ["0"]
          zones: ["concourse"]
        memories:
          - "I am on the concourse level. From here, street exits are: Blackett Street, Grey Street, and Eldon Square."
          - "From the concourse, these street exits are the final routes out of the station to street level."
          - "To reach Platforms 3 and 4, I use 'Escalator A (down to Platform 3 & Platform 4)'."
          - "To reach Platforms 1 and 2, I use 'Escalator D (down to Platform 1 & Platform 2)'."

# Video generation configuration
video:
  enabled: true
  fps: 20
  speedup: 1.0
  dpi: 100
  html_log: "simulation_log.html"

# Fire marshal systems — present in ALL five Proulx (1991) drills.
#
# Setup: 4 uniformed fire fighters emerged from the staff room the moment
# the alarm sounded.  They split 2/2 between the TOP and BOTTOM of the N/S
# escalators (the D/E/F bank, serving Platforms 1 and 2).  They powered off
# the escalators and physically blocked passage.  Their only verbal response
# to passenger queries was "Please evacuate the station."
#
# ~4–5 minutes post-alarm the fully operational Fire Brigade arrived, checked
# the fire location on the electronic board, and directed remaining passengers
# to evacuate (issuing the "All Clear" once the station was empty).
#
# Experiment configs that add their own systems: (E2, E4) will have those
# staff merged with these fire marshals via the extends deep-merge.
systems:

  # Two fire marshals at the TOP of the N/S escalators (concourse level 0).
  # Positioned between escalators D and E (one) and at escalator F (other).
  # Positions are derived at runtime from the corridor geometry
  # (zone: "escalator_X_entrance" → midpoint of corridor's concourse-side edge + 1.5 m outward).
  firefighter_top:
    enabled: true
    role_label: "Fire Marshal"
    walking_speed: 1.5
    spawn_positions:
      - zone: "escalator_d_entrance_L0"   # just outside top of escalator D corridor
        level_id: "0"
      - zone: "escalator_f_entrance_L0"   # just outside top of escalator F corridor
        level_id: "0"
    phases:
      - trigger: on_event          # activate when fire alarm fires
        movement: hold
        directive_radius: 10.0
        directive_interval: 15.0
        message: "Please evacuate the station. Escalator D (down to platforms), Escalator E (going up) and Escalator F (going up) are closed — use Escalator B or Escalator C to reach the concourse."

  # Two fire marshals at the BOTTOM of the N/S escalators (platform level -1).
  # Positioned in front of escalator D (one) and escalator F (other).
  # Positions are derived at runtime from the corridor geometry.
  firefighter_bottom:
    enabled: true
    role_label: "Fire Marshal"
    walking_speed: 1.5
    spawn_positions:
      - zone: "escalator_d_entrance_L-1"   # just outside bottom of escalator D corridor
        level_id: "-1"
      - zone: "escalator_f_entrance_L-1"   # just outside bottom of escalator F corridor
        level_id: "-1"
    phases:
      - trigger: on_event
        movement: hold
        directive_radius: 10.0
        directive_interval: 15.0
        message: "Please evacuate the station. Escalator D (down to platforms), Escalator E (going up) and Escalator F (going up) are closed — use Escalator B or Escalator C to reach the concourse."

  # The fully operational Fire Brigade arrives ~4–5 minutes post-alarm.
  # Modelled as a single officer who patrols the concourse and escalator
  # area giving stronger directives after the first responders.
  firefighter_brigade:
    enabled: true
    role_label: "Fire Brigade Officer"
    walking_speed: 1.6
    spawn_positions:
      - position: [87.0, 0.0]   # far end of concourse near Blackett Street — out of the way until brigade arrives
        level_id: "0"
    phases:
      # Phase 0: dormant at the Blackett Street end until brigade arrives (~4.5 min).
      - trigger: on_event
        movement: hold
        directive_radius: 0.0
        directive_interval: 9999.0
        message: ""
      # Phase 1: 4.5 min post-alarm (~t=285 s) patrol and direct firmly.
      - trigger: after_seconds
        trigger_after_seconds: 270
        movement: zone_patrol
        patrol_zones:
          - zone: concourse
            level_id: "0"
          - zone: platform_1
            level_id: "-1"
        patrol_dwell_time: 45.0
        directive_radius: 15.0
        directive_interval: 10.0
        message: >-
          This is the Fire Brigade. You must leave the station immediately.
          Please use the nearest street exit now.

# Performance optimization
performance:
  batch_processing: true
  agent_cooldown: 10.0
  decision_caching: true
  max_parallel_agents: 10


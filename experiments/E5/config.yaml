extends: ../base.yaml

# E5 — PA gives detailed information: fire location and specific actions required
# A rich PA announcement names the location of the fire and gives clear,
# differentiated instructions based on where passengers are in the station.
# No staff are present.

events:
  - time: 15.0
    message: "The fire alarm is sounding throughout the station. You cannot see any evidence of a fire."
  - time: 20.0
    type: pa_announcement
    message: >
      Attention please. This is an emergency announcement.
      A fire has been reported in the station concourse near the main entrance on Monument Street.
      Passengers on the platforms: do not attempt to use the escalators to the concourse.
      Please remain on the platform and await further instructions — staff will assist you shortly.
      Passengers on the concourse: please move immediately to the Grey Street or Grainger Street exits,
      away from the Monument Street entrance.
      Do not use the lifts. Do not re-enter the station.

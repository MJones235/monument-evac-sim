extends: ../base.yaml

# E3 — Public address system used to tell people to evacuate
#
# Based on the real drill report:
#   - Train 124 arrives at the platforms before the alarm sounds.
#   - Five seconds after the train arrives the Control Room broadcasts a
#     minimal, non-directive PA: "Please, evacuate the station immediately."
#     (repeated at 20-second intervals).
#   - No staff members are present.
#
# The train_arrival event (t=10 s) activates train boarding exits so agents
# can board as a legitimate evacuation means; the PA does not direct them to
# do so (it is intentionally non-directive).

events:
  - time: 10.0
    type: train_arrival
    platforms: [1, 2, 3, 4]
    dwell_seconds: 30
    message: "A train is waiting at each platform."
  - time: 15.0
    message: "The fire alarm is sounding throughout the station. You cannot see any evidence of a fire."
  # Fire marshals power off and block the N/S escalators (D/E/F bank) at alarm time.
  - time: 15.0
    type: block_exit
    exits: [escalator_d_down, escalator_e_up, escalator_f_up]

  - time: 20.0
    type: pa_announcement
    repeat_interval: 20.0
    message: >-
      Please, evacuate the station immediately.
      Please, evacuate the station immediately.
